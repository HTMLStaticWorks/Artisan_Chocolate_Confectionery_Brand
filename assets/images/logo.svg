<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 50" width="180" height="50" fill="none">
    <!-- Icon Group -->
    <g transform="translate(6, 4)">
        <!-- Elegant Monogram V -->
        <path d="M 2 2 C 5 12 11 28 16 38 C 17 40 19 40 20 38 C 25 28 31 12 34 2" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Star accent on top left of V -->
        <path d="M 2 2 L 0 0 M 2 2 L 4 0 M 2 2 L 0 4 M 2 2 L 4 4" stroke="currentColor" stroke-width="0.8" opacity="0.7"/>
        <!-- Cocoa Bean nested inside the V -->
        <path d="M 18 8 C 13.5 14 13.5 24 18 30 C 22.5 24 22.5 14 18 8 Z" fill="var(--accent)" stroke="currentColor" stroke-width="1"/>
        <!-- Cocoa Bean internal lines (ridges) -->
        <path d="M 18 8 C 16 14 16 24 18 30" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.6"/>
        <path d="M 18 8 C 20 14 20 24 18 30" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.6"/>
        <path d="M 18 8 L 18 30" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.6"/>
    </g>
    <!-- Integrated Brand Name -->
    <text x="50" y="26" font-family="'Cormorant Garamond', 'Playfair Display', 'Didot', 'Georgia', serif" font-size="19" font-weight="700" letter-spacing="2" fill="currentColor">VELOURA</text>
    <text x="50" y="40" font-family="'Inter', sans-serif" font-size="8.5" font-weight="600" letter-spacing="3.5" fill="var(--accent)">CHOCOLATES</text>
</svg>
